name: TechFlow CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # -------------------------
  # Job 1: Run Tests
  # -------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          echo "Installing dependencies"
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          echo "Running unit tests"
          pytest

  # -------------------------
  # Job 2: Build & Push Docker Image
  # -------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: test  # only run if tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:latest \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:${{ github.sha }} .

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:${{ github.sha }}

  # -------------------------
  # Job 3: Deploy to EC2
  # -------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push  # only run if build-and-push succeeds

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_PUBLIC_IP }} "
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:latest &&
            docker stop techflow-container || true &&
            docker rm techflow-container || true &&
            docker run -d --name techflow-container -p 5000:5000 ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:latest
          "