name: TechFlow CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # -------------------------
  # Job 1: Run Tests
  # -------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest

  # -------------------------
  # Job 2: Build & Push Docker Image
  # -------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:latest \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:${{ github.sha }} .

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:${{ github.sha }}

  # -------------------------
  # Job 3: Deploy to EC2
  # -------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_PUBLIC_IP }} "
            # Ensure repo exists
            if [ ! -d ~/techflow-project ]; then
              mkdir -p ~/techflow-project
              git clone https://github.com/Geboyi/Techflow-Project.git ~/techflow-project
            else
              cd ~/techflow-project && git pull
            fi

            cd ~/techflow-project

            # Make scripts executable
            chmod +x scripts/*.sh

            # Tag current container as previous_stable
            ./scripts/tag_stable.sh

            # Pull latest Docker image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:latest

            # Stop & remove old container
            docker rm -f techflow-container || true

            # Run new container
            docker run -d --name techflow-container -p 5000:5000 ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:latest

            # Run health check; rollback if fails
            ./scripts/health_check.sh || ./scripts/rollback.sh

            # Send email notification (optional)
            ./scripts/send_email.sh \"\$([ $? -eq 0 ] && echo Success || echo Failure)\"
          "